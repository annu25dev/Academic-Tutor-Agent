<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EduPilot | Student Profile</title>

    <link rel="stylesheet" href="form.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="form-container">

    <div class="form-card">

        <div class="header">

            <div class="logo-circle">
                <i class="fa-solid fa-user-graduate"></i>
            </div>

            <h1>Student Profile</h1>

            <p>
                Tell EduPilot about yourself so we can personalize your learning experience.
            </p>

        </div>

        <form id="profileForm">

            <!-- Basic Information -->

            <h2>
                <i class="fa-solid fa-user"></i>
                Basic Information
            </h2>

            <div class="row">

                <div class="input-group">
                    <label>Full Name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Enter your full name"
                        required>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        required>
                </div>

            </div>

            <div class="row">

                <div class="input-group">
                    <label>College / School</label>
                    <input
                        type="text"
                        id="college"
                        name="college"
                        placeholder="Enter your institution">
                </div>

                <div class="input-group">
                    <label>Course</label>
                    <input
                        type="text"
                        id="course"
                        name="course"
                        placeholder="Example: B.Tech">
                </div>

            </div>

            <div class="row">

                <div class="input-group">

                    <label>Semester / Class</label>

                    <select id="semester" name="semester">

                        <option value="">Select</option>

                        <option>Semester 1</option>
                        <option>Semester 2</option>
                        <option>Semester 3</option>
                        <option>Semester 4</option>
                        <option>Semester 5</option>
                        <option>Semester 6</option>
                        <option>Semester 7</option>
                        <option>Semester 8</option>

                        <option>Class 6</option>
                        <option>Class 7</option>
                        <option>Class 8</option>
                        <option>Class 9</option>
                        <option>Class 10</option>
                        <option>Class 11</option>
                        <option>Class 12</option>

                    </select>

                </div>

                <div class="input-group">

                    <label>Academic Goal</label>

                    <select id="goal" name="goal">

                        <option value="">Select</option>

                        <option>Exam Preparation</option>
                        <option>Placement Preparation</option>
                        <option>Concept Learning</option>
                        <option>Competitive Exams</option>
                        <option>Skill Development</option>

                    </select>

                </div>

            </div>

            <hr>

            <!-- Learning Style -->

            <h2>
                <i class="fa-solid fa-brain"></i>
                Learning Style
            </h2>

            <div class="radio-group">

                <label>
                    <input
                        type="radio"
                        name="style"
                        value="Reading">
                    Reading
                </label>

                <label>
                    <input
                        type="radio"
                        name="style"
                        value="Interactive">
                    Interactive
                </label>

                <label>
                    <input
                        type="radio"
                        name="style"
                        value="Practice Based">
                    Practice Based
                </label>

            </div>

            <hr>

            <!-- Subjects -->

            <h2>
                <i class="fa-solid fa-book-open"></i>
                Subjects
            </h2>

            <div class="input-group">

                <label>Subjects You Need Help With</label>

                <input
                    type="text"
                    id="subjects"
                    name="subjects"
                    placeholder="Example: DBMS, DSA, Operating Systems">

            </div>

            <hr>

            <!-- Learning Level -->

            <h2>
                <i class="fa-solid fa-chart-line"></i>
                Learning Level
            </h2>

            <div class="slider-container">

                <div class="level-labels">

                    <span>Beginner</span>

                    <span>Intermediate</span>

                    <span>Advanced</span>

                </div>

                <input
                    type="range"
                    id="level"
                    min="1"
                    max="3"
                    value="2"
                    step="1">

                <div class="level-display">

                    <span id="levelText">
                        Intermediate
                    </span>

                </div>

            </div>

            <hr>

            <!-- About -->

            <h2>
                <i class="fa-solid fa-pen"></i>
                About You
            </h2>

            <div class="input-group">

                <label>Additional Information</label>

                <textarea
                    id="about"
                    name="about"
                    placeholder="Tell EduPilot about your strengths, weaknesses, or study goals..."></textarea>

            </div>

            <button class="save-btn" type="submit">

                <i class="fa-solid fa-floppy-disk"></i>

                Save & Continue

            </button>

        </form>

    </div>

</div>

<script>
    document.getElementById('profileForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Get all form inputs
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const semester = document.getElementById('semester').value;
        const goal = document.getElementById('goal').value;
        const style = document.querySelector('input[name="style"]:checked');
        const subjects = document.getElementById('subjects').value.trim();
        
        // Validate required fields
        if (!name) {
            alert('Please enter your full name');
            return;
        }
        
        if (!email) {
            alert('Please enter your email address');
            return;
        }
        
        // Basic email validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            alert('Please enter a valid email address');
            return;
        }
        
        if (!semester) {
            alert('Please select your semester or class');
            return;
        }
        
        if (!goal) {
            alert('Please select your academic goal');
            return;
        }
        
        if (!style) {
            alert('Please select your learning style');
            return;
        }
        
        if (!subjects) {
            alert('Please enter the subjects you need help with');
            return;
        }
        
        // Collect form data
        const formData = new FormData(this);
        const profileData = Object.fromEntries(formData);
        
        // Save to localStorage
        localStorage.setItem('userProfile', JSON.stringify(profileData));
        
        // Show success message and redirect
        alert('Profile saved successfully!');
        window.location.href = 'dashboard.html';
    });
    
    // Update level display when slider changes
    document.getElementById('level').addEventListener('change', function() {
        const levels = ['Beginner', 'Intermediate', 'Advanced'];
        document.getElementById('levelText').textContent = levels[this.value - 1];
    });
</script>

</body>

</html>
