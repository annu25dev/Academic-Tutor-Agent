<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EduPilot | Chat History</title>

    <link rel="stylesheet" href="/static/chathistory.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>


<div class="container">


    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">


        <div class="logo">

            <img src="/static/logo.jpg" alt="EduPilot Logo">


            <div>

                <h2>EduPilot</h2>

                <p>Your AI Study Companion</p>

            </div>


        </div>


        <hr>



        <div class="menu">


            <button class="menu-btn"
            onclick="location.href='/dashboard'">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </button>



            <button class="menu-btn"
            onclick="location.href='/notes'">

                <i class="fa-solid fa-upload"></i>

                Upload Notes

            </button>



            <button class="menu-btn active">

                <i class="fa-solid fa-clock-rotate-left"></i>

                Chat History

            </button>



        </div>


    </aside>





    <!-- ================= MAIN SECTION ================= -->


    <main class="main">



        <div class="top-bar">


            <h1>
                Chat History
            </h1>


            <p>
                Review your previous conversations with EduPilot.
            </p>


        </div>





        <!-- History Section -->


        <section class="history-section">



            <div class="history-container" id="historyContainer">

    <div class="empty-state">

        <i class="fa-solid fa-comments"></i>

        <p>
            Your previous conversations will appear here.
        </p>

    </div>

</div>

        </section>




    </main>



</div>




<script src="/static/chathistory.js"></script>



</body>

</html>
